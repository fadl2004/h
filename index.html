<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>متابعة الصداع</title>


<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



</head>

<body>

<header>

<h1>🧠 متابعة الصداع الشهرية</h1>

<p>
سجل نوبات الصداع واحصل على إحصائيات شهرية
</p>

</header>

<div class="container">

<div class="form">

<h2>إضافة سجل جديد</h2>

<label>التاريخ</label>

<input
type="date"
id="date"
>

<label>وقت البداية</label>

<input
type="time"
id="start"
>

<label>وقت النهاية</label>

<input
type="time"
id="end"
>

<label>درجة الألم (1 - 10)</label>

<input
type="range"
min="1"
max="10"
value="5"
id="pain"
>

<span id="painValue">5</span>

<label>ملاحظات</label>

<textarea
id="notes"
placeholder="اكتب أي ملاحظات..."
></textarea>

<button id="saveBtn">

💾 حفظ السجل

</button>

</div>

<hr>

<div class="stats">

<h2>

إحصائيات الشهر

</h2>

<div class="cards">

<div class="card">

<h3>

عدد النوبات

</h3>

<p id="count">

0

</p>

</div>

<div class="card">

<h3>

إجمالي الساعات

</h3>

<p id="hours">

0

</p>

</div>

<div class="card">

<h3>

متوسط الألم

</h3>

<p id="average">

0

</p>

</div>

<div class="card">

<h3>

أعلى ألم

</h3>

<p id="maxPain">

0

</p>

</div>

</div>

</div>

<hr>

<div class="tableArea">

<h2>

السجل الشهري

</h2>

<table>

<thead>

<tr>

<th>التاريخ</th>

<th>من</th>

<th>إلى</th>

<th>المدة</th>

<th>الألم</th>

<th>ملاحظات</th>

<th>حذف</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<hr>

<div class="chartBox">

<h2>

الرسم البياني

</h2>

<canvas id="chart"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
